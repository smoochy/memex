name: Sync upstream

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync-main:
    runs-on: ubuntu-latest

    steps:
      - name: Check out fork main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.MEMEX_SYNC_TOKEN }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebase main onto upstream
        run: |
          git remote add upstream https://github.com/iamtouchskyer/memex.git
          git fetch upstream main
          git rebase upstream/main
          git remote set-url origin https://x-access-token:${{ secrets.MEMEX_SYNC_TOKEN }}@github.com/${{ github.repository }}.git
          git push --force-with-lease origin HEAD:main
